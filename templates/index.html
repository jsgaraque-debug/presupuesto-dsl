<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de Lenguajes Formales</title>
    <link rel="stylesheet" href="/static/CSS/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

</head>

<body>
    <header class="titulo-principal">
        <h1>Calculadora de Lenguajes Formales</h1>
    </header>

    <div class="layout">
        <div class="info-card">
            <div class="imagen-circular">
                <img src="/static/IMG/avatar.png" alt="Imagen decorativa">
            </div>
            <p>
                Esta herramienta permite realizar operaciones con
                conjuntos, cadenas y lenguajes formales.
            </p>
        </div>

        <div class="app-container">
            <!-- Tabs de Categorías -->
            <div class="tabs">
                <button class="tab-button active" onclick="mostrarSeccion('conjuntos', event)">Conjuntos</button>
                <button class="tab-button" onclick="mostrarSeccion('cadenas', event)">Cadenas</button>
                <button class="tab-button" onclick="mostrarSeccion('lenguajes', event)">Lenguajes</button>
            </div>
            <!-- Sección Conjuntos -->
            <div id="conjuntos" class="tab-content active">
                <h2>Operaciones con Conjuntos</h2>
                <input type="text" id="conjuntoA" placeholder="Conjunto A (ej: a,b,c)">
                <input type="text" id="conjuntoB" placeholder="Conjunto B (ej: b,c,d)">
                <select id="operacionConjuntos">
                    <option value="pertenencia">Pertenencia</option>
                    <option value="union">Unión</option>
                    <option value="interseccion">Intersección</option>
                    <option value="complemento">Complemento (A respecto a B)</option>
                    <option value="diferencia">Diferencia Absoluta (A - B)</option>
                    <option value="simetrica">Diferencia Simétrica</option>
                </select>

                <div class="button-group">
                    <button onclick="calcularConjunto()">Calcular</button>
                    <button onclick="limpiarCampos()">Limpiar</button>
                </div>
            </div>

            <!--Sección Cadenas -->
            <div id="cadenas" class="tab-content">
                <h2>Operaciones con Cadenas</h2>
                <input type="text" id="cadenaA" placeholder="Cadena A (ej: hola)">
                <input type="text" id="cadenaB" placeholder="Cadena B o número">
                <select id="operacionCadenas" onchange="ajustarCadenas()">
                    <option value="concatenacion">Concatenación</option>
                    <option value="potenciacion">Potenciación</option>
                    <option value="reflexion">Reflexión/Trasposición</option>
                </select>
                <div class="button-group">
                    <button onclick="calcularCadenas()">Calcular</button>
                    <button onclick="limpiarCampos()">Limpiar</button>
                </div>
            </div>

            <!-- Sección Lenguajes -->
            <div id="lenguajes" class="tab-content">
                <h2>Operaciones con Lenguajes</h2>

                <!-- Inputs -->
                <input type="text" id="lenguajeA" placeholder="Lenguaje A (ej: a,b)">
                <input type="text" id="lenguajeB" placeholder="Lenguaje B (ej: c,d)">
                <input type="text" id="potenciaLenguaje" placeholder="Potencia n (solo para Potenciación)">

                <!-- Select con onchange -->
                <select id="operacionLenguajes" onchange="ajustarLenguajes()">
                    <option value="concatenacion">Concatenación</option>
                    <option value="potenciacion">Potenciación</option>
                    <option value="reflexion">Reflexión/Trasposición</option>
                    <option value="union">Unión</option>
                    <option value="interseccion">Intersección</option>
                    <option value="resta">Resta</option>
                    <option value="kleene">Clausura de Kleene</option>
                    <option value="positiva">Clausura Positiva</option>
                </select>

                <!-- Botones -->
                <div class="button-group">
                    <button onclick="calcularLenguajes()">Calcular</button>
                    <button onclick="limpiarCampos()">Limpiar</button>
                </div>
            </div>

            <!-- Mostrar Resultado -->
            <div class="resultado-card">
                <h3>Resultado:</h3>
                <p id="resultado">—</p>
            </div>
        </div>
    </div>
     <footer>
  <p>© 2025 Calculadora de Lenguajes Formales | Diseñado por María Camila</p>
  <div class="footer-icons">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-github"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
  </div>
</footer>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>

</html>
